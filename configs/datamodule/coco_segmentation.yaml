name: "coco_segmentation"
dataset_name: "coco"
data_dir: "./data"
batch_size: 16
num_workers: 4
image_size: 224
num_classes: 81
ignore_index: 255
download: false
coco_year: "2017"

# Expects:
# ./data/coco/train2017
# ./data/coco/val2017
# ./data/coco/annotations/instances_train2017.json
# ./data/coco/annotations/instances_val2017.json
max_train_samples: 2048
max_val_samples: 256
max_test_samples: 256
subset_seed: 42
