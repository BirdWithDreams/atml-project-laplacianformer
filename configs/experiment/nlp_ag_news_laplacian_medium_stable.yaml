# @package _global_
defaults:
  - override /task: nlp_classification_ag_news
  - override /datamodule: ag_news
  - override /model: laplacian_1d_cuda_medium_lambda8_pool2_ns8_dropout10
  - override /optimizer: adamw_text_stable_lr7e_5
  - override /trainer: default

trainer:
  max_epochs: 16
  precision: 32
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0

task:
  name: "nlp_classification"
  label_smoothing: 0.05

logger:
  project: "nlp-classification-recommended"
  name: "nlp_ag_news_laplacian_medium_stable"
  extra_tags:
    - "recommendation:ag_news"
    - "analysis:laplacian_lower_lr"
