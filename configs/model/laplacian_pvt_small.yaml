name: "laplacian_pvt_small"
backbone_type: "pvt"
attn_type: "laplacian"
laplacian_backend: "torch"
laplacian_fallback_to_torch: true
img_size: 224

embed_dims: [64, 128, 320, 512]
depths: [3, 4, 6, 3]
num_heads: [1, 2, 5, 8]
mlp_ratios: [8.0, 8.0, 4.0, 4.0]
patch_sizes: [7, 3, 3, 3]
strides: [4, 2, 2, 2]
paddings: [3, 1, 1, 1]
pool_ratios: [8, 4, 2, 1]

lambda_scale: 4.0
ns_iters: 5
use_rope: true
rope_base: 10000.0
