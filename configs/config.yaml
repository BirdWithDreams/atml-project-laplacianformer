defaults:
  - _self_
  - task: cv_classification
  - model: vanilla
  - datamodule: cifar100

seed: 42
trainer:
  max_epochs: 30
  accelerator: auto
  devices: auto
  precision: "16-mixed"
  log_every_n_steps: 10

logger:
  project: "laplacian-vs-vanilla"
  name: "${task.name}_${model.name}_${datamodule.name}"
